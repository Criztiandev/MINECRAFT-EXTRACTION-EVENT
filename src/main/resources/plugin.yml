name: ExtractionEvent
version: "${project.version}"
main: com.criztiandev.extractionevent.ExtractionEventPlugin
api-version: "1.21"
author: criztiandev
description: A Minecraft plugin for extraction event mechanics.
website: https://github.com/criztiandev/extraction-event

soft-depend: [ProtocolLib]

commands:
  lrev:
    description: Main command for Loot Region Event regions.
    usage: /lrev [gui|wand|create|remove|list|showNameTags|toggle|reload]
    aliases: [lev, ee, extractionevent]

permissions:
  extractionevent.admin:
    description: Full admin access — GUI, /lev toggle, /lev showNameTags.
    default: op

  lev.bypass:
    description: Bypasses warzone restrictions (spectator mode, flight, reach checks).
    default: op
